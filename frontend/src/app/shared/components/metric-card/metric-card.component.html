<div
  class="dashboard-panel px-5 py-4 text-graphite-50"
  [ngClass]="{
    'border-emerald-400/40': tone === 'success',
    'border-amber-300/40': tone === 'warn'
  }"
>
  <p class="text-xs uppercase tracking-[0.24em] text-graphite-300">{{ title }}</p>
  <div class="mt-3 flex items-baseline gap-2">
    <span class="text-3xl font-semibold text-white">{{ value }}</span>
    <span *ngIf="subtitle" class="text-sm text-graphite-300">{{ subtitle }}</span>
  </div>
</div>
