<section class="px-6 py-6 md:px-10 md:py-8">
  <div class="flex flex-col gap-6">
    <header class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
      <div class="max-w-2xl">
        <div class="glass-chip inline-flex items-center gap-2 px-4 py-1 text-xs uppercase tracking-[0.35em] text-graphite-200">
          Mission Control
        </div>
        <h1 class="mt-4 text-3xl font-semibold text-white md:text-4xl">
          Tenant Log Management Dashboard
        </h1>
        <p class="mt-2 text-sm text-graphite-200 md:text-base">
          Real-time oversight for the ingestion pipeline, with tenant-level isolation, metrics, and manual testing tools.
        </p>
      </div>
      <app-tenant-filter
        [tenants]="store.tenants()"
        [selected]="store.selectedTenant()"
        (selectedChange)="store.selectTenant($event)"
      ></app-tenant-filter>
    </header>

    <app-stats-cards
      [stats]="store.stats()"
      [loading]="store.loading()"
    ></app-stats-cards>

    <div class="grid grid-cols-1 gap-6 xl:grid-cols-3">
      <app-log-stream-table
        class="xl:col-span-2"
        [logs]="store.logs()"
        [loading]="store.loading()"
        [lastUpdated]="store.lastUpdated()"
        [error]="store.error()"
      ></app-log-stream-table>

      <app-manual-ingest-form
        [tenant]="store.selectedTenant()"
        [loading]="store.ingestLoading()"
        (submitIngest)="onManualIngest($event)"
      ></app-manual-ingest-form>
    </div>
  </div>
</section>
